name: ib-build
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    # NOTE: incredibuild-runner is replaced with the Incredibuild cloud Build Runner label before push.
    runs-on: incredibuild-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache-persistence confirm (run 3)
        run: |
          chmod +x scripts/ib-runner-recon3.sh
          ./scripts/ib-runner-recon3.sh | tee runner-recon3.log

      - name: Build (exercise Incredibuild acceleration)
        run: |
          make clean || true
          make -j all
          ./app || true

      - name: Upload recon evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ib-runner-recon
          path: runner-recon3.log
          retention-days: 1
